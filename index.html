<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DLB Welfare - Raffle Result</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Popup Modal Styles - Simplified Version */
    .modal {
      display: none; /* Hidden by default */
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      padding: 40px 30px;
      border-radius: 30px;
      max-width: 450px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .congrats-text {
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .prize-amount {
      font-size: 52px;
      font-weight: 800;
      color: #10b981;
      margin: 15px 0;
      text-shadow: 2px 2px 4px rgba(16, 185, 129, 0.2);
    }

    .prize-rank {
      font-size: 32px;
      font-weight: 600;
      color: #667eea;
      margin: 10px 0;
    }

    .city-info {
      font-size: 28px;
      font-weight: 500;
      color: #4b5563;
      margin: 15px 0 25px;
    }

    .city-info span {
      font-weight: 700;
      color: #dc2626;
    }

    .close-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 16px 50px;
      font-size: 22px;
      font-weight: 600;
      border-radius: 60px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      margin-top: 10px;
    }

    .close-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
    }

    .close-btn:active {
      transform: scale(0.95);
    }

    /* Mobile responsive */
    @media (max-width: 480px) {
      .modal-content {
        padding: 30px 20px;
      }
      .congrats-text {
        font-size: 28px;
      }
      .prize-amount {
        font-size: 40px;
      }
      .prize-rank {
        font-size: 26px;
      }
      .city-info {
        font-size: 22px;
      }
      .close-btn {
        padding: 14px 40px;
        font-size: 20px;
      }
    }

    /* Prize-specific colors */
    .first-prize-amount {
      color: #dc2626;
    }
    .first-prize-rank {
      color: #f59e0b;
    }
    .second-prize-amount {
      color: #10b981;
    }
    .second-prize-rank {
      color: #3b82f6;
    }
    .third-prize-amount {
      color: #8b5cf6;
    }
    .third-prize-rank {
      color: #ec4899;
    }
  </style>
</head>
<body>
  <!-- Popup Modal - Simplified -->
  <div id="prizeModal" class="modal">
    <div class="modal-content">
      <div class="congrats-text">🎉 Congratulations! 🎉</div>
      <div class="prize-amount" id="prizeAmount">200,000 LKR</div>
      <div class="prize-rank" id="prizeRank">1st Prize</div>
      <div class="city-info" id="cityInfo">City: <span>Colombo</span></div>
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>

  <!-- Simple loading or background content (optional) -->
  <div style="color: white; text-align: center;">
    <h1>DLB Welfare Society</h1>
    <p>Checking your ticket...</p>
  </div>

  <script>
    // ---------- WINNERS DATABASE ----------
    // Format: { ticketNumber: { prizeRank: "1st Prize", prizeAmount: "200,000 LKR", city: "Colombo" } }
    const winners = {
      // Main prizes
      '1000001': { rank: '1st Prize', amount: '200,000 LKR', city: 'Colombo' },
      '1000002': { rank: '2nd Prize', amount: '100,000 LKR', city: 'Galle' },
      '1000003': { rank: '3rd Prize', amount: '75,000 LKR', city: 'Kurunegala' },
      '1000004': { rank: '4th Prize', amount: '50,000 LKR', city: 'Jaffna' },
      '1000005': { rank: '5th Prize', amount: '25,000 LKR', city: 'Anuradhapura' },
      
      // Consolation prizes (10,000 LKR each)
      '304050': { rank: 'Consolation Prize', amount: '10,000 LKR', city: 'Kandy' },
      '202020': { rank: 'Consolation Prize', amount: '10,000 LKR', city: 'Matara' },
      '303030': { rank: 'Consolation Prize', amount: '10,000 LKR', city: 'Negombo' },
      '404040': { rank: 'Consolation Prize', amount: '10,000 LKR', city: 'Trinco' },
      '505050': { rank: 'Consolation Prize', amount: '10,000 LKR', city: 'Ratnapura' },
      '606060': { rank: 'Consolation Prize', amount: '10,000 LKR', city: 'Gampaha' },
      '707070': { rank: 'Consolation Prize', amount: '10,000 LKR', city: 'Badulla' },
      '808080': { rank: 'Consolation Prize', amount: '10,000 LKR', city: 'Monaragala' },
      '909090': { rank: 'Consolation Prize', amount: '10,000 LKR', city: 'Polonnaruwa' },
      '902233': { rank: 'Consolation Prize', amount: '10,000 LKR', city: 'Hambantota' }
    };

    // Get ticket number from URL (?ticket=XXXXXX)
    function getTicketFromURL() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('ticket'); // Returns the ticket number or null
    }

    // Show modal with prize details
    function showPrizeModal(ticketNumber) {
      const modal = document.getElementById('prizeModal');
      const prizeAmountEl = document.getElementById('prizeAmount');
      const prizeRankEl = document.getElementById('prizeRank');
      const cityInfoEl = document.getElementById('cityInfo');
      
      // Check if ticket exists in winners database
      if (winners[ticketNumber]) {
        const prize = winners[ticketNumber];
        
        // Set content
        prizeAmountEl.textContent = prize.amount;
        prizeRankEl.textContent = prize.rank;
        cityInfoEl.innerHTML = `City: <span>${prize.city}</span>`;
        
        // Apply special styling for first prize
        if (ticketNumber === '1000001') {
          prizeAmountEl.classList.add('first-prize-amount');
          prizeRankEl.classList.add('first-prize-rank');
        } else {
          // Remove any previous special classes
          prizeAmountEl.classList.remove('first-prize-amount', 'second-prize-amount', 'third-prize-amount');
          prizeRankEl.classList.remove('first-prize-rank', 'second-prize-rank', 'third-prize-rank');
        }
        
        // Show modal
        modal.style.display = 'flex';
      } else {
        // Optional: Show a "not winner" message
        prizeAmountEl.textContent = '0 LKR';
        prizeRankEl.textContent = 'Not a Winner';
        cityInfoEl.innerHTML = 'Better luck next time!';
        modal.style.display = 'flex';
        
        // You could also redirect to a "sorry" page or just show nothing
        // alert('Sorry, this ticket is not a winner.');
      }
    }

    // Close modal function
    function closeModal() {
      document.getElementById('prizeModal').style.display = 'none';
    }

    // Close modal if clicked outside
    window.onclick = function(event) {
      const modal = document.getElementById('prizeModal');
      if (event.target === modal) {
        modal.style.display = 'none';
      }
    }

    // Run when page loads
    window.onload = function() {
      const ticket = getTicketFromURL();
      if (ticket) {
        // Small delay for better UX (optional)
        setTimeout(() => {
          showPrizeModal(ticket);
        }, 300);
      } else {
        // No ticket in URL - show message or redirect
        document.body.innerHTML = `
          <div style="color: white; text-align: center; padding: 50px;">
            <h1>DLB Welfare Society</h1>
            <p style="font-size: 24px;">Please provide a ticket number in the URL</p>
            <p style="font-size: 18px;">Example: ?ticket=1000001</p>
          </div>
        `;
      }
    };
  </script>
</body>
</html>
